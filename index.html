<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BimbelPro Premium+</title>

<style>
:root{
  --bg:#0b0f1a;
  --text:#ffffff;
  --card:rgba(255,255,255,0.06);
  --primary:#6c63ff;
  --accent:#00e0ff;
}

/* LIGHT MODE */
#toggle:checked ~ *{
  --bg:#f5f5f5;
  --text:#111;
  --card:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:var(--bg);color:var(--text);transition:.4s}
.wrap{max-width:1100px;margin:auto;padding:0 20px}
.section{padding:80px 0}

/* NAV */
nav{position:fixed;width:100%;top:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);z-index:10}
.nav-inner{display:flex;justify-content:space-between;align-items:center;height:70px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:35px}

/* HAMBURGER */
#menu-toggle{display:none}
.menu-icon{display:none;font-size:24px;cursor:pointer}
.menu{display:flex}
.menu a{margin:0 10px;color:var(--text);text-decoration:none}

/* HERO */
.hero{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:80px}
.hero h1{font-size:42px}
.hero img{width:100%;border-radius:20px}

.btn{display:inline-block;padding:12px 25px;border-radius:30px;background:linear-gradient(45deg,var(--primary),var(--accent));color:#fff;text-decoration:none;margin-top:15px}

/* CARD */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:var(--card);padding:20px;border-radius:20px;transition:.3s}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}

/* PRICING */
.price{font-size:24px;margin:10px 0}

/* CTA */
.cta{text-align:center;padding:40px;border-radius:20px;background:linear-gradient(45deg,#6c63ff,#00e0ff)}

/* TOGGLE BUTTON */
.toggle-btn{cursor:pointer;border:1px solid #ccc;padding:5px 10px;border-radius:10px}

/* MOBILE */
@media(max-width:800px){
  .hero{grid-template-columns:1fr;text-align:center}
  .menu{display:none;flex-direction:column;background:#000;position:absolute;top:70px;right:0;padding:20px}
  #menu-toggle:checked + .menu-icon + .menu{display:flex}
  .menu-icon{display:block}
}
</style>
</head>

<body>

<input type="checkbox" id="toggle">

<nav>
<div class="wrap nav-inner">
<div class="logo">
<img src="logo.png">
<b>BimbelPro</b>
</div>

<input type="checkbox" id="menu-toggle">
<label for="menu-toggle" class="menu-icon">☰</label>

<div class="menu">
<a href="#home">Home</a>
<a href="#program">Program</a>
<a href="#harga">Harga</a>
<a href="#kontak">Kontak</a>
</div>

<label for="toggle" class="toggle-btn">🌙</label>

</div>
</nav>

<!-- HERO -->
<section class="section wrap hero" id="home">
<div>
<h1>Website Bimbel Premium 🚀</h1>
<p>Solusi modern untuk meningkatkan jumlah siswa</p>
<a href="#" class="btn">Daftar</a>
</div>
<img src="https://via.placeholder.com/500x300">
</section>

<!-- PROGRAM -->
<section class="section wrap" id="program">
<h2>Program</h2>
<div class="grid">
<div class="card"><img src="https://via.placeholder.com/300x150"><h3>SD</h3></div>
<div class="card"><img src="https://via.placeholder.com/300x150"><h3>SMP</h3></div>
<div class="card"><img src="https://via.placeholder.com/300x150"><h3>SMA</h3></div>
</div>
</section>

<!-- PRICING -->
<section class="section wrap" id="harga">
<h2>Paket Harga</h2>
<div class="grid">
<div class="card">
<h3>Basic</h3>
<div class="price">Rp 300K</div>
<p>Belajar standar</p>
</div>
<div class="card">
<h3>Premium</h3>
<div class="price">Rp 500K</div>
<p>Mentor + full materi</p>
</div>
</div>
</section>

<!-- CTA -->
<section class="section wrap">
<div class="cta">
<h2>Siap Daftar?</h2>
<a href="#" class="btn">Mulai Sekarang</a>
</div>
</section>

<!-- KONTAK -->
<section class="section wrap" id="kontak">
<h2>Kontak</h2>
<iframe src="https://maps.google.com/maps?q=jakarta&output=embed" style="width:100%;height:250px;border:none;border-radius:20px"></iframe>
</section>

</body>
</html>
